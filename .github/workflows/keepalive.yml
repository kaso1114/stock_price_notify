name: Keepalive Workflows

on:
  workflow_dispatch:
  schedule:
    # 00:20 UTC = 08:20 Asia/Taipei on the 1st and 15th of each month
    - cron: "20 0 1,15 * *"

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Update keepalive marker
        shell: bash
        run: |
          mkdir -p .github
          printf 'last_keepalive_utc=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > .github/keepalive

      - name: Commit keepalive marker
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive
          git commit -m "chore: keep scheduled workflows active" || exit 0
          git push
