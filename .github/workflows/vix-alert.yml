name: VIX Alert

on:
  workflow_dispatch:
  schedule:
    # 00:00 UTC = 08:00 Asia/Taipei
    - cron: "0 0 * * 1-5"
    # 14:30 UTC = 22:30 Asia/Taipei
    - cron: "30 14 * * 1-5"

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Check VIX and send alert
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VIX_THRESHOLD: ${{ vars.VIX_THRESHOLD }}
        run: python main.py
