name: VIX Alert

on:
  workflow_dispatch:
  schedule:
    # 00:45 UTC = 08:45 Asia/Taipei
    - cron: "45 0 * * 1-5"

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Check VIX and send alert
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VIX_THRESHOLD: ${{ vars.VIX_THRESHOLD }}
        run: python main.py
